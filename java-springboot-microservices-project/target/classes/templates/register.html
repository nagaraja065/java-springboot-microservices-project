<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register – Grand Spice Restaurant</title>
    <meta name="description" content="Create your account to start booking tables at Grand Spice Restaurant"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <div class="icon">✨</div>
            <h1>Create Account</h1>
            <p>Join Grand Spice Restaurant</p>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name"
                       class="form-control"
                       placeholder="John Smith"
                       required/>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       class="form-control"
                       placeholder="john@example.com"
                       required/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control"
                       placeholder="Choose a strong password"
                       required minlength="6"/>
            </div>

            <button type="submit" class="btn btn-primary">
                🚀 Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in here</a>
        </div>
    </div>
</div>
</body>
</html>
